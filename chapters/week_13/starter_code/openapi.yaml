openapi: 3.0.3
info:
  title: CampusFlow API
  description: |
    待办： 用 2-4 句话说明你的 CampusFlow 项目解决什么问题。

    待办： 列出真实业务约束，例如标题长度、ID 格式、日期格式、认证要求。
  version: 0.0.0-TODO

servers:
  - url: http://localhost:8080
    description: 本地开发服务器

tags:
  - name: 任务管理
    description: 待办： 说明任务相关 API 的范围

paths:
  /api/tasks:
    get:
      tags: [任务管理]
      summary: 获取所有任务
      description: |
        待办： 说明排序、分页、搜索、过滤规则。
      responses:
        '200':
          description: 待办： 成功返回任务列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '500':
          description: 待办： 服务器错误时的响应

    post:
      tags: [任务管理]
      summary: 创建新任务
      description: |
        待办： 写清楚必填字段、可选字段、校验失败条件。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: 待办： 任务创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: 待办： 请求参数错误

  /api/tasks/{id}:
    get:
      tags: [任务管理]
      summary: 获取单个任务
      description: 待办： 说明找不到任务时如何响应。
      parameters:
        - name: id
          in: path
          required: true
          description: 待办： 任务 ID 的真实格式
          schema:
            type: string
      responses:
        '200':
          description: 待办： 成功返回任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: 待办： 任务不存在

    put:
      tags: [任务管理]
      summary: 更新任务
      description: 待办： 说明 PUT 是完整更新还是局部更新。
      parameters:
        - name: id
          in: path
          required: true
          description: 待办： 任务 ID 的真实格式
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '200':
          description: 待办： 任务更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: 待办： 请求参数错误
        '404':
          description: 待办： 任务不存在

    delete:
      tags: [任务管理]
      summary: 删除任务
      description: 待办： 说明是物理删除还是软删除。
      parameters:
        - name: id
          in: path
          required: true
          description: 待办： 任务 ID 的真实格式
          schema:
            type: string
      responses:
        '204':
          description: 待办： 删除成功
        '404':
          description: 待办： 任务不存在

components:
  schemas:
    Task:
      type: object
      required:
        - id
        - title
        - completed
      properties:
        id:
          type: string
          description: 待办： 任务唯一标识符
        title:
          type: string
          description: 待办： 任务标题约束
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: 待办： 任务描述是否可选
        completed:
          type: boolean
          description: 待办： 完成状态含义
        createdAt:
          type: string
          format: date-time
          description: 待办： 创建时间格式

    TaskInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          description: 待办： 任务标题约束
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: 待办： 任务描述是否可选

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: 待办： 面向调用方的错误信息
