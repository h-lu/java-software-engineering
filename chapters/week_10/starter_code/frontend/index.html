<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CampusFlow Reviewed Frontend</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
      max-width: 760px;
    }
  </style>
</head>
<body>
  <main>
    <h1>CampusFlow</h1>
    <p id="status">待办：在这里实现审查并修复后的 frontend。</p>
    <form id="task-form">
      <label>
        Task title
        <input id="task-title" name="title" autocomplete="off">
      </label>
      <button type="submit">Add task</button>
    </form>
    <section id="tasks" aria-live="polite"></section>
  </main>
  <script>
    const API_BASE = 'http://localhost:7070';

    document.querySelector('#task-form').addEventListener('submit', (event) => {
      event.preventDefault();
      // 待办：校验输入，调用 CampusFlow API，处理错误，再用 textContent 安全渲染。
      document.querySelector('#status').textContent = `待办：连接到 ${API_BASE}`;
    });
  </script>
</body>
</html>
