<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{week_title}}</title>
  
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 样式 -->
  <link rel="stylesheet" href="themes/modern-education.css">
  
  <!-- 代码高亮 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  
  <style>
    /* 幻灯片容器 */
    .slides-container {
      display: flex;
      flex-direction: column;
      gap: 40px;
      padding: 40px;
      background: #F1F5F9;
    }
    
    /* 单页幻灯片 */
    .slide {
      width: 1280px;
      height: 720px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      position: relative;
      page-break-after: always;
    }
    
    /* 导航控制 */
    .slide-nav {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      z-index: 1000;
    }
    
    .slide-nav button {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .slide-nav button:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .slide-nav .page-info {
      color: white;
      padding: 10px 16px;
      font-size: 14px;
    }
    
    /* 缩略图侧边栏 */
    .thumbnails {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 12px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }
    
    .thumbnail {
      width: 120px;
      height: 68px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .thumbnail:hover {
      border-color: #0D7377;
      transform: scale(1.05);
    }
    
    .thumbnail.active {
      border-color: #0D7377;
    }
    
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* 全屏模式 */
    .fullscreen .slide {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      z-index: 9999;
    }
    
    .fullscreen .thumbnails,
    .fullscreen .slides-container {
      display: none;
    }
    
    /* 打印样式 */
    @media print {
      .slide-nav,
      .thumbnails {
        display: none !important;
      }
      
      .slides-container {
        padding: 0;
        background: white;
      }
      
      .slide {
        box-shadow: none;
        border-radius: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <!-- 缩略图导航 -->
  <div class="thumbnails" id="thumbnails">
    <!-- 动态生成 -->
  </div>
  
  <!-- 幻灯片容器 -->
  <div class="slides-container" id="slidesContainer">
    {{slides_content}}
  </div>
  
  <!-- 导航控制 -->
  <div class="slide-nav">
    <button onclick="prevSlide()">← 上一页</button>
    <span class="page-info"><span id="currentPage">1</span> / <span id="totalPages">{{total_pages}}</span></span>
    <button onclick="nextSlide()">下一页 →</button>
    <button onclick="toggleFullscreen()">⛶ 全屏</button>
  </div>
  
  <script>
    // 幻灯片导航
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    
    document.getElementById('totalPages').textContent = totalSlides;
    
    function showSlide(index) {
      if (index < 0 || index >= totalSlides) return;
      currentSlide = index;
      slides[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
      updateThumbnails();
      document.getElementById('currentPage').textContent = index + 1;
    }
    
    function nextSlide() {
      showSlide(currentSlide + 1);
    }
    
    function prevSlide() {
      showSlide(currentSlide - 1);
    }
    
    function toggleFullscreen() {
      slides[currentSlide].requestFullscreen();
    }
    
    // 缩略图
    function generateThumbnails() {
      const container = document.getElementById('thumbnails');
      slides.forEach((slide, index) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumbnail' + (index === 0 ? ' active' : '');
        thumb.onclick = () => showSlide(index);
        
        // 使用 canvas 生成缩略图
        const canvas = document.createElement('canvas');
        canvas.width = 240;
        canvas.height = 135;
        const ctx = canvas.getContext('2d');
        
        // 简化渲染
        ctx.fillStyle = getComputedStyle(slide).background;
        ctx.fillRect(0, 0, 240, 135);
        
        const img = document.createElement('img');
        img.src = canvas.toDataURL();
        thumb.appendChild(img);
        container.appendChild(thumb);
      });
    }
    
    function updateThumbnails() {
      document.querySelectorAll('.thumbnail').forEach((thumb, index) => {
        thumb.classList.toggle('active', index === currentSlide);
      });
    }
    
    // 键盘导航
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === 'f') toggleFullscreen();
    });
    
    // 初始化
    generateThumbnails();
    hljs.highlightAll();
    
    // 滚动监听更新当前页
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const index = Array.from(slides).indexOf(entry.target);
          currentSlide = index;
          document.getElementById('currentPage').textContent = index + 1;
          updateThumbnails();
        }
      });
    }, { threshold: 0.5 });
    
    slides.forEach(slide => observer.observe(slide));
  </script>
</body>
</html>
